name: Daily Scraper Update

on:
  schedule:
    - cron: '0 18 * * *'  # 每天北京时间凌晨 2 点运行 (UTC 18:00)
  workflow_dispatch:      # 允许你在 GitHub 页面手动点击运行进行测试

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright pandas fake-useragent openai
          playwright install chromium

      - name: Run Scraper
        run: python Scraper_for_UWA.py  # 确保你的爬虫文件名是 scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add uwa_for_ai_analysis.csv
          git commit -m "Auto-update scholarship data" || exit 0
          git push
