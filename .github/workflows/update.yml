name: Daily Scraper Update

on:
  schedule:
    - cron: '0 18 * * 0'  # 北京时间凌晨 2 点 每周一次更新
  workflow_dispatch:      # 允许手动运行

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright pandas fake-useragent openai
          # 关键：这行会自动安装 Ubuntu 24.04 及以上版本所需的所有浏览器依赖
          sudo npx playwright install-deps chromium
          playwright install chromium

      - name: Run Scraper
        run: |
          echo "Checking files..."
          ls
          # 如果你的文件名有误，这行会尝试运行它。请确保文件名大小写准确
          python Scraper_for_UWA.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          # 确保这个文件名和你脚本导出的名字一致
          git add uwa_for_ai_analysis.csv
          git commit -m "Auto-update scholarship data" || exit 0
          git push
